<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Claude Plan Renderer</title>
    <link rel="stylesheet" href="/src/styles.css" />
    <script>
      // Apply persisted theme before first paint. Key shared with src/titlebar.ts (THEME_KEY).
      try { var t = localStorage.getItem("plan-reader-theme");
            if (t === "dark") document.documentElement.dataset.theme = "dark"; } catch (e) {}
      // Apply persisted reading-pane text size before first paint (no flash).
      // Key + ladder shared with src/titlebar.ts (TEXT_SIZE_KEY / the [13,14,15,17,19,21]
      // ladder). Validate against the ladder; default to 15 if missing/invalid.
      try { var s = parseInt(localStorage.getItem("plan-reader-text-size"), 10);
            if ([13, 14, 15, 17, 19, 21].indexOf(s) === -1) s = 15;
            document.documentElement.style.setProperty("--reading-font-size", s + "px"); } catch (e) {}
    </script>
    <script type="module" src="/src/main.ts" defer></script>
  </head>
  <body>
    <div class="window" role="application" aria-label="Claude Plan Renderer">
      <!-- title bar — macOS native-overlay style: the REAL OS traffic lights sit
           over the top-left of this bar (see titleBarStyle:"Overlay" in
           tauri.conf.json). The bar itself is the drag region. The
           .titlebar-controls slot holds genuinely interactive controls (the
           theme toggle; later sub-plans append their button + overlay as later
           siblings here). Those controls keep pointer-events:auto and are
           carved out of window-drag by isDragTarget() in src/titlebar.ts, which
           bails on interactive targets — NOT by omitting the drag attribute. -->
      <div class="titlebar" data-tauri-drag-region>
        <div class="titlebar-controls">
          <!-- Prompt Feedback button (Sub-Plan 03). FIRST child so #theme-toggle stays
               far-right. Hidden until >=1 comment exists; main.ts toggles `.hidden` and the
               #feedback-count badge via applyFeedbackButtonState(). No data-tauri-drag-region —
               window-drag exclusion for this <button> is handled by isDragTarget() in
               src/titlebar.ts (interactive-target bail), not by omitting the attribute. -->
          <button class="feedback-btn hidden" id="feedback-btn" type="button"
                  title="Show prompt feedback" aria-label="Show prompt feedback">
            <span class="ico" aria-hidden="true">&#128172;</span>
            <span class="label">Prompt Feedback</span>
            <span class="badge" id="feedback-count">0</span>
          </button>
          <!-- Plan Review hook setup (ExitPlanMode hook). Real interactive <button>s in
               the .titlebar-controls slot, so window-drag exclusion is the isDragTarget()
               interactive-target bail in src/titlebar.ts — NOT data-tauri-drag-region.
               #hook-setup installs the PreToolUse/ExitPlanMode hook (install_hook);
               #hook-remove uninstalls it (uninstall_hook). Phase 6 wires the clicks and
               toggles which is shown based on install state. -->
          <button class="theme-toggle hook-btn" id="hook-setup" type="button"
                  title="Install plan-review hook" aria-label="Install plan-review hook">
            <span class="label">Install plan-review hook</span>
          </button>
          <button class="theme-toggle hook-btn" id="hook-remove" type="button"
                  title="Remove plan-review hook" aria-label="Remove plan-review hook">
            <span class="label">Remove</span>
          </button>
          <!-- In-DOM status line for the hook install/remove actions. Replaces window.alert
               (a no-op in Tauri v2 WKWebView): a transient success/error message lives here.
               main.ts toggles `.hidden` and the `.error` modifier (red) and sets textContent;
               it auto-clears after a few seconds. Not a drag region (it is titlebar chrome but
               carries no data-tauri-drag-region, and isDragTarget()'s interactive-control bail
               does not apply to a <span> — so window-drag exclusion is irrelevant: a status
               readout is not clickable). aria-live=polite announces the result to AT. -->
          <span class="hook-status hidden" id="hook-status" role="status" aria-live="polite"></span>
          <!-- Reading-pane text-size steppers. Placed immediately BEFORE
               #theme-toggle so the theme toggle stays far-right. Like the theme
               toggle they are ordinary interactive <button>s: window-drag
               exclusion is handled by isDragTarget()'s interactive-target bail in
               src/titlebar.ts; they are excluded from the window drag region via
               that bail, not via the drag attribute or pointer-events. They
               step the shared --reading-font-size var through a fixed ladder
               (initTextSize, src/titlebar.ts) and persist to plan-reader-text-size. -->
          <button class="theme-toggle" id="text-dec" type="button"
                  title="Decrease text size" aria-label="Decrease text size">
            <span class="ico" aria-hidden="true">A&#8722;</span>
          </button>
          <button class="theme-toggle" id="text-inc" type="button"
                  title="Increase text size" aria-label="Increase text size">
            <span class="ico" aria-hidden="true">A+</span>
          </button>
          <button class="theme-toggle" id="theme-toggle" type="button"
                  title="Toggle dark / light theme" aria-label="Toggle dark / light theme">
            <span class="ico" id="theme-icon">&#9789;</span>
          </button>
        </div>
      </div>

      <div class="body">
        <!-- sidebar -->
        <aside class="sidebar">
          <!-- Tabbed left panel: Plans (default) + Contents (ToC of open plan).
               initTabs() in main.ts toggles .active on a .tab and its matching
               .tab-pane. The sidebar↔reading-pane boundary stays disjoint: the
               ToC is built from a plain TocEntry[] produced by the render
               facade (extractToc), never by querying #reading-pane here. -->
          <div class="tab-row" role="tablist">
            <span class="tab active" data-tab="plans" role="tab">Plans</span>
            <span class="tab" data-tab="contents" role="tab">Contents</span>
          </div>

          <!-- Plans pane (default-active). #plan-count stays in this head — a
               frozen contract selector; do not relocate it. -->
          <div class="tab-pane active" id="tab-plans">
            <div class="sidebar-head">
              <h2>Recent Plans</h2>
              <span class="count" id="plan-count">0 files</span>
            </div>
            <!-- Live sidebar filter (Fix 1). Keeps the frozen .search container class; now an
                 interactive control: search icon + #plan-filter input + clear (✕) button.
                 Filters the Plans tab only (never #toc-list). -->
            <div class="search">
              <span class="ico" aria-hidden="true">🔍</span>
              <input id="plan-filter" type="text" placeholder="Filter plans…" autocomplete="off" aria-label="Filter plans" />
              <button class="clear" type="button" title="Clear filter" aria-label="Clear filter">✕</button>
            </div>
            <!-- #plan-list: 03 mutates — sidebar rows rendered/updated here -->
            <div class="plan-list" id="plan-list"></div>
          </div>

          <!-- Contents pane — table of contents for the currently-open plan.
               #toc-list is built by buildToc() in main.ts from extractToc's
               read-only walk of the rendered pane. -->
          <div class="tab-pane" id="tab-contents">
            <div class="toc-head"><h2>Contents</h2></div>
            <div class="toc-list" id="toc-list"></div>
          </div>
        </aside>

        <!-- reading pane -->
        <!-- #reader-scroll: scroll-preservation anchor (02 refines) -->
        <main class="reader" id="reader-scroll">
          <div class="reader-inner">
            <div class="doc-header">
              <div class="doc-filename" id="doc-filename"></div>
              <div class="doc-src" id="doc-src"></div>
            </div>

            <!-- Review action bar (Plan Review). PERSISTENT, NON-OCCLUDING affordance shown whenever
                 one or more plan reviews are pending (main.ts toggles `.hidden` via refreshReviewBar()
                 from the pure applyReviewBarState). Docked at the top of the reading column (inside
                 .reader-inner, in normal flow — it does NOT float over the pane like #feedback-overlay),
                 so the user can select text + add inline comments AND act on the review at once.
                 Two modes (see applyReviewBarState):
                   • VIEWING  — a review is rendered in the pane: #review-submit (enabled with >=1
                     comment → deny + feedback) and #review-dismiss (→ "allow", releases the hook so
                     Claude Code shows its normal terminal plan-approval prompt) are shown.
                   • SUMMARY  — reviews are pending but the user is browsing a real plan: only the
                     count label + #review-resume (re-open the newest pending review) are shown, so a
                     pending review never traps navigation.
                 Approve-as-auto-execute is GONE (a PreToolUse hook cannot auto-approve a plan). -->
            <div class="review-bar hidden" id="review-bar" role="region" aria-label="Plan review actions">
              <span class="review-bar-label" id="review-bar-label"></span>
              <div class="review-bar-actions">
                <button class="rb-btn" id="review-submit" type="button" disabled
                        title="Submit your inline comments as feedback">Submit feedback</button>
                <button class="rb-btn" id="review-clear" type="button"
                        title="Clear all of this plan's comments (click again to confirm)">Clear comments</button>
                <button class="rb-btn rb-approve" id="review-dismiss" type="button"
                        title="Release the hook so Claude Code shows its normal terminal plan-approval prompt">Dismiss → approve in terminal</button>
                <button class="rb-btn" id="review-resume" type="button"
                        title="Re-open the newest pending plan review">Resume ▸</button>
              </div>
            </div>

            <!-- #reading-pane: 02 renders into — the markdown render target.
                 Sub-Plan 01 shows raw text only (white-space: pre-wrap). -->
            <div class="md" id="reading-pane"></div>
          </div>
        </main>
      </div>

      <!-- Selection popover (Sub-Plan 02). Placed OUTSIDE #reading-pane (a child of
           .window) so renderInto's pane-only innerHTML wipe never removes it. No
           data-tauri-drag-region (it is not part of the titlebar). The single applier
           renderPopover() in src/render/comments.ts is the sole writer of `.hidden` /
           #sp-quote / #sp-text. -->
      <div class="sel-popover hidden" id="sel-popover">
        <div class="sp-quote" id="sp-quote"></div>
        <textarea id="sp-text" placeholder="Add a comment for Claude Code…"></textarea>
        <div class="sp-foot">
          <button id="sp-cancel" type="button">Cancel</button>
          <button class="save" id="sp-save" type="button">Add comment</button>
        </div>
      </div>

      <!-- Prompt Feedback overlay (Sub-Plan 03). Placed OUTSIDE the titlebar and the
           reading pane (a sibling of #sel-popover under .window) so it inherits no
           drag region and survives the pane's innerHTML wipe. position:fixed (CSS)
           anchors it top-right beneath the titlebar. main.ts toggles `.hidden`,
           snapshots the generated prompt into the feedback-body pre on open, and
           wires Copy / Clear. NO data-tauri-drag-region. -->
      <div class="feedback-overlay hidden" id="feedback-overlay">
        <div class="fo-head">
          <h3>Prompt Feedback</h3>
          <div class="fo-actions">
            <button id="feedback-copy" type="button">Copy</button>
            <button id="feedback-clear" type="button">Clear comments</button>
          </div>
        </div>
        <pre class="fo-body" id="feedback-body"></pre>
        <div class="fo-foot">Each entry concisely quotes the highlighted snippet, then your comment.</div>
      </div>
    </div>
  </body>
</html>
